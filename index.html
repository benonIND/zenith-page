<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>ZENITH-X | Intelligence Dashboard</title>

    <meta property="og:title" content="ZENITH-X Intelligence Dashboard">
    <meta property="og:description" content="Autonomous Intelligence System - Monitoring Tren Internet & Memory Database secara Real-time.">
    <meta property="og:image" content="https://raw.githubusercontent.com/benonIND/zenith-dashboard/main/logo-zenith.jpg"> <meta property="og:url" content="https://benonind.github.io/zenith-dashboard/">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#3b82f6">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="ZENITH-X | Intel Dashboard">
    <meta name="twitter:description" content="Monitoring Autonomous AI Intelligence Feed.">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'JetBrains Mono', monospace; background: #0a0a0c; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glow-blue { box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="text-gray-300 p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-blue-500 tracking-tighter">ZENITH-X <span class="text-white font-light">INTEL</span></h1>
                <p class="text-xs text-gray-500">Autonomous Intelligence System v6.5</p>
            </div>
            <div id="status-bot" class="px-4 py-2 rounded-full glass text-xs flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> SYSTEM ONLINE
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10" id="stats-container">
            <div class="glass p-6 rounded-xl">
                <p class="text-gray-500 text-xs uppercase">Total Intelligence</p>
                <h3 id="total-intel" class="text-3xl font-bold text-white mt-1">0</h3>
            </div>
            <div class="glass p-6 rounded-xl border-b-2 border-blue-500">
                <p class="text-gray-500 text-xs uppercase">Database Format</p>
                <h3 class="text-3xl font-bold text-white mt-1">GIST.OBJ</h3>
            </div>
            <div class="glass p-6 rounded-xl">
                <p class="text-gray-500 text-xs uppercase">Last Update</p>
                <h3 id="last-update" class="text-3xl font-bold text-white mt-1">--:--</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-8">
            <div class="glass rounded-2xl p-6 overflow-hidden">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-white flex items-center gap-2">
                        <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        Live Intelligence Feed
                    </h2>
                    <button onclick="fetchData()" class="text-xs hover:text-blue-400 transition">REFRESH</button>
                </div>
                <div id="feed" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </div>
    </div>

    <script>
        const GIST_ID = 'a13ebe972a480564350215b37871a226'; 

        async function fetchData() {
            try {
                const response = await fetch(`https://api.github.com/gists/${GIST_ID}?t=${Date.now()}`);
                const data = await response.json();
                const memory = JSON.parse(data.files['memory.json'].content);
                render(memory);
            } catch (err) {
                console.error("Gagal sinkronisasi data.");
            }
        }

        function render(memory) {
            const container = document.getElementById('feed');
            const items = Object.values(memory).reverse();
            
            document.getElementById('total-intel').innerText = items.length;
            if(items[0]) document.getElementById('last-update').innerText = items[0].metadata?.created_at || 'Today';

            container.innerHTML = items.slice(0, 12).map(item => `
                <div class="glass p-5 rounded-xl border-l-2 border-blue-600 hover:glow-blue transition-all duration-300">
                    <div class="flex justify-between items-start mb-3">
                        <span class="text-[10px] bg-blue-900/30 text-blue-400 px-2 py-1 rounded tracking-widest uppercase">${item.category || 'TREND'}</span>
                        <span class="text-[10px] text-gray-600">${item.metadata?.timestamp?.split('T')[1].slice(0,5) || ''}</span>
                    </div>
                    <h4 class="text-white font-bold mb-2 leading-tight">${item.topic}</h4>
                    <p class="text-xs text-gray-500 leading-relaxed">${item.summary}</p>
                    <div class="mt-4 pt-3 border-t border-white/5 flex justify-between items-center">
                        <span class="text-[9px] text-gray-600">SOURCE: ${item.metadata?.source || 'WEB'}</span>
                        <div class="flex gap-1">
                            <span class="w-1 h-1 rounded-full bg-blue-500"></span>
                            <span class="w-1 h-1 rounded-full bg-blue-500/50"></span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        fetchData();
        setInterval(fetchData, 300000);
    </script>
</body>
</html>
